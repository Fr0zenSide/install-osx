# Terminal popup (Ctrl+F)
bind-key -n C-f run-shell 'bash -c "source ~/.config/scripts/tools.sh; toggle-tmux-popup"'

# Notes/Flsh layer (Ctrl+Shift+F via F12 proxy) — persistent session across all windows
bind-key -n F12 run-shell 'bash -c "source ~/.config/scripts/tools.sh; toggle-tmux-notes"'

# IDE-like command palette (prefix + o)
bind-key o run-shell 'tmux display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "bash ~/.config/scripts/tmux-palette.sh #{pane_id}"'

# IDE-like grep (prefix + g)
bind-key g run-shell 'tmux display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "bash ~/.config/scripts/tmux-grep.sh #{pane_id}"'

