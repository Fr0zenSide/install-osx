# ── Copy-mode mouse fix (MUST be after TPM to override tmux-yank) ────
# copy-pipe = copies to clipboard + clears selection highlight + stays in
# copy-mode at current scroll position. Press q/Escape to exit when done.
# - NOT copy-pipe-and-cancel (snaps to bottom = original bug, confirmed 2026-04-20)
# - NOT copy-pipe-no-clear (keeps selection highlighted = second bug)
# For no-q copy: use Option+drag (macOS Terminal/iTerm2) to bypass tmux entirely.
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
