# Dracula theme
set -g @plugin 'dracula/tmux'

set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-show-flags true

set -g @dracula-plugins "cpu-usage ram-usage"

# Dracula segment colors — rainbow gradient flowing into Shikki segments
# green (cpu) → cyan (ram) → orange (shikki) → pink (project) → purple (git)
# Using dark_gray fg on colored bg — consistent weight across all segments
set -g @dracula-cpu-usage-colors "green dark_gray"
set -g @dracula-ram-usage-colors "cyan dark_gray"

# Force consistent font style across entire status bar
set -g @dracula-show-empty-plugins false

set -g status-position bottom
set -g set-clipboard on # use system clipboard


# ── Pane navigation ─────────────────────────────────────────────────────
# Two layers, on purpose:
#
# 1. Opt+Left / Opt+Right  →  NOT bound in tmux. They pass through to zsh,
#    where _smart-backward-or-pane / _smart-forward-or-pane (in
#    ~/.config/scripts/tools.sh) decide word-move vs pane-switch based on
#    cursor position. Means: natural word-jump in a shell prompt, automatic
#    pane-switch at the buffer edge. But only works in zsh — Claude Code,
#    shi-tui, vim, less etc. never see these keys reach the shell.
#
# 2. Ctrl+Opt+Arrow  →  ALWAYS bound here in tmux (`bind -n` = no prefix).
#    `bind -n` intercepts the key before any program in the pane sees it,
#    so this works EVERYWHERE: zsh, Claude Code, shi-tui, vim, less, htop,
#    anything. Use this when you're not in a shell prompt and need to
#    switch panes regardless of what's running.
#
# 3. Opt+Up / Opt+Down  →  kept as global pane-switch (no smart logic for
#    vertical because text buffers don't have a meaningful "up-word" /
#    "down-word"; multiline editing is rare enough to not warrant it).
#
# `unbind -n M-Left/Right` is required because tmux's `source-file` does
# NOT drop keys removed from the config — previous bindings linger in
# server memory after reload until explicitly unbound.
unbind -n M-Left
unbind -n M-Right
# bind -n M-Left  select-pane -L   # handled in zsh widget
# bind -n M-Right select-pane -R   # handled in zsh widget
bind -n M-Up   select-pane -U
bind -n M-Down select-pane -D

# Universal pane-switch — works in any program (Claude Code, shi-tui, vim…)
bind -n C-M-Left  select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up    select-pane -U
bind -n C-M-Down  select-pane -D

# swap windows with shift+arrow with prefix
bind-key S-Left swap-window -t -1
bind-key S-Right swap-window -t +1

